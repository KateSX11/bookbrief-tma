services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/bookbrief.db
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.bot
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db-data:
